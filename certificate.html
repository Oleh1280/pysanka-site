<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Подарунковий сертифікат | Писан·ка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arsenal:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  /* ---------- PRINTABLE CERTIFICATE ---------- */
  .cert-stage {
    min-height: 100vh;
    background: var(--bg-soft);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 50px 20px;
  }
  .cert-toolbar {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  .cert-toolbar .hint { color: var(--text-muted); font-size: 14px; }

  /* The certificate itself — A5 landscape proportion (210×148mm ≈ 1.42:1) */
  .certificate {
    width: 920px;
    max-width: 100%;
    aspect-ratio: 1.42 / 1;
    background: #fffdf7;
    display: grid;
    grid-template-columns: 42% 58%;
    box-shadow: 0 30px 70px -20px rgba(0,0,0,0.45);
    position: relative;
    overflow: hidden;
    color: #1a1a1a;
  }

  /* LEFT — product photo */
  .cert-photo-side {
    position: relative;
    overflow: hidden;
    background: #181818;
  }
  .cert-photo-side img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .cert-photo-side .photo-frame {
    position: absolute;
    inset: 14px;
    border: 1.5px solid rgba(255,255,255,0.55);
    pointer-events: none;
  }
  .cert-photo-side .photo-tag {
    position: absolute;
    left: 24px;
    bottom: 24px;
    color: #fff;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }
  .cert-photo-side .photo-tag strong {
    display: block;
    font-size: 15px;
    margin-top: 2px;
  }

  /* RIGHT — text panel */
  .cert-text-side {
    position: relative;
    padding: 44px 44px 38px;
    display: flex;
    flex-direction: column;
    background:
      repeating-linear-gradient(45deg, rgba(212,165,55,0.025) 0 10px, transparent 10px 20px),
      #fffdf7;
  }
  /* ornamental meander top + bottom */
  .cert-text-side::before,
  .cert-text-side::after {
    content: "";
    position: absolute;
    left: 44px;
    right: 44px;
    height: 8px;
    background-image:
      repeating-linear-gradient(90deg, #c9a84e 0 2px, transparent 2px 6px);
    opacity: 0.7;
  }
  .cert-text-side::before { top: 22px; }
  .cert-text-side::after { bottom: 22px; }

  .cert-kicker {
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #a88530;
    font-weight: 700;
    margin-top: 18px;
  }
  .cert-title {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.15;
    margin: 6px 0 2px;
  }
  .cert-title i { color: #E97000; font-style: italic; }
  .cert-amount {
    font-size: 72px;
    font-weight: 700;
    line-height: 1;
    color: #1a1a1a;
    margin: 14px 0 6px;
  }
  .cert-amount.workshop { font-size: 40px; }
  .cert-amount .cur { color: #E97000; }
  .cert-for {
    font-size: 15px;
    color: #555;
    margin-bottom: auto;
  }
  .cert-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #c9a84e;
    margin: 18px 0;
  }
  .cert-divider span { flex: 1; height: 1px; background: #d8c89a; }

  .cert-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 24px;
    font-size: 13px;
    color: #444;
    margin-bottom: 18px;
  }
  .cert-meta .lbl {
    color: #999;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 3px;
  }
  .cert-meta .val { font-weight: 700; font-size: 15px; color: #1a1a1a; }
  .cert-meta .line { border-bottom: 1px solid #cbb98a; min-height: 20px; }

  .cert-footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .cert-brand {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .cert-brand i { color: #E97000; font-style: normal; }
  .cert-brand small {
    display: block;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: #888;
    margin-top: 2px;
  }
  .cert-sign {
    text-align: center;
    font-size: 11px;
    color: #999;
  }
  .cert-sign .sign-line {
    width: 130px;
    border-bottom: 1px solid #1a1a1a;
    margin-bottom: 4px;
    height: 28px;
    font-family: 'Arsenal', cursive;
    font-style: italic;
    font-size: 18px;
    color: #1a1a1a;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 2px;
  }

  /* DARK theme on screen */
  [data-theme="dark"] .certificate {
    background: #161310;
    color: #ece4d4;
  }
  [data-theme="dark"] .cert-text-side {
    background:
      repeating-linear-gradient(45deg, rgba(212,165,55,0.04) 0 10px, transparent 10px 20px),
      #1a1714;
  }
  [data-theme="dark"] .cert-title,
  [data-theme="dark"] .cert-amount,
  [data-theme="dark"] .cert-meta .val { color: #f4ecdc; }
  [data-theme="dark"] .cert-for { color: #b0a692; }
  [data-theme="dark"] .cert-brand { color: #f4ecdc; }
  [data-theme="dark"] .cert-sign .sign-line { border-color: #c9a84e; color: #f4ecdc; }

  /* PRINT */
  @media print {
    @page { size: A5 landscape; margin: 0; }
    body * { visibility: hidden; }
    .certificate, .certificate * { visibility: visible; }
    .cert-stage { padding: 0; background: #fff; min-height: auto; }
    .cert-toolbar, [data-header], [data-footer] { display: none !important; }
    .certificate {
      width: 100%;
      height: 100vh;
      box-shadow: none;
      page-break-inside: avoid;
      background: #fffdf7 !important;
      color: #1a1a1a !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .cert-text-side {
      background: #fffdf7 !important;
    }
    .cert-title, .cert-amount, .cert-meta .val, .cert-brand { color: #1a1a1a !important; }
  }

  @media (max-width: 600px) {
    .certificate { grid-template-columns: 1fr; aspect-ratio: auto; }
    .cert-photo-side { aspect-ratio: 4/3; }
    .cert-amount { font-size: 54px; }
    .cert-title { font-size: 24px; }
  }
</style>
</head>
<body>

<div data-header></div>

<div class="cert-stage">
  <div class="cert-toolbar">
    <button class="btn" onclick="window.print()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:18px;height:18px"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>
      Роздрукувати
    </button>
    <a class="btn btn-ghost" href="shop.html?school=Сертифікат">← До сертифікатів</a>
  </div>

  <div class="certificate" id="certificate">
    <!-- filled by JS -->
  </div>

  <p class="hint" style="color:var(--text-muted);font-size:13px;max-width:600px;text-align:center;">
    Друкуйте на щільному папері A5 (горизонтально). Сертифікат активується після оплати — менеджер надішле унікальний код.
  </p>
</div>

<div data-footer></div>

<script src="script.js"></script>
<script src="layout.js"></script>
<script>
  function renderCertificate() {
    const params = new URLSearchParams(location.search);
    const id = parseInt(params.get('id'), 10);
    const code = params.get('code') || '';
    let product = (typeof PRODUCTS !== 'undefined') ? PRODUCTS.find(p => p.id === id && p.isCert) : null;
    // Fallback if not found
    if (!product) {
      product = { name: 'Сертифікат', certBg: 'images/bukovyna-rose.webp', certAmount: '500 ₴', price: 500, sv: 'cert' };
    }
    const isWorkshop = product.sv === 'cert-workshop';
    const amount = product.certAmount || (product.price + ' ₴');
    const amountHtml = isWorkshop
      ? 'Майстер-<i class="cur" style="font-style:normal;color:#E97000">клас</i>'
      : amount.replace('₴', '<span class="cur">₴</span>');

    // Generate validity date (6 months ahead) — computed at render time
    const now = new Date();
    const valid = new Date(now.getFullYear(), now.getMonth() + 6, now.getDate());
    const validStr = valid.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: 'numeric' });

    const forText = isWorkshop
      ? 'Груповий майстер-клас з воскового розпису писанок. Від 6 осіб, 400 ₴ за кожного додаткового учасника. Усі матеріали включені.'
      : 'На будь-яку писанку ручної роботи з колекції майстерні. Сертифікат можна використати повністю або частково.';

    document.getElementById('certificate').innerHTML = `
      <div class="cert-photo-side">
        <img src="${product.certBg}" alt="Робота майстрині">
        <div class="photo-frame"></div>
        <div class="photo-tag">Авторська робота<strong>Галина Сиротюк-Пʼятничук</strong></div>
      </div>
      <div class="cert-text-side">
        <div class="cert-kicker">Подарунковий сертифікат</div>
        <div class="cert-amount ${isWorkshop ? 'workshop' : ''}">${amountHtml}</div>
        <div class="cert-for">${forText}</div>
        <div class="cert-divider"><span></span>✦<span></span></div>
        <div class="cert-meta">
          <div>
            <span class="lbl">Код сертифіката</span>
            <span class="val ${code ? '' : 'line'}">${code || ''}</span>
          </div>
          <div>
            <span class="lbl">Дійсний до</span>
            <span class="val">${validStr}</span>
          </div>
        </div>
        <div class="cert-footer">
          <div class="cert-brand">Писан<i>·</i>ка<small>майстерня писанкового розпису · Коломия</small></div>
          <div class="cert-sign">
            <div class="sign-line">Г. С.</div>
            підпис майстрині
          </div>
        </div>
      </div>`;
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderCertificate();
    // Re-render once Sanity data arrives (in case products reload)
    const orig = window.reRenderCurrentPage;
    window.reRenderCurrentPage = function() { if (orig) orig(); renderCertificate(); };
  });
</script>
</body>
</html>
